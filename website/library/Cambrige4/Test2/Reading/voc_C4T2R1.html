// ── Tab switch ──
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    if (t.getAttribute('onclick') && t.getAttribute('onclick').includes("'" + id + "'")) t.classList.add('active');
  });
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === id));
  if (id === 'trap') initTrap();
  if (id === 'sim') initSim();
  if (id === 'mistakes') renderMistakes();
  if (id === 'phrases') renderPhrase();
}

function speak(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-GB';
  window.speechSynthesis.speak(u);
}

function escQ(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function setMode(m) {
  vocabMode = m;
  document.getElementById('modeCtx').classList.toggle('active', m === 'ctx');
  document.getElementById('modeDir').classList.toggle('active', m === 'dir');
  renderVocab();
}

function jumpLevel(lv) {
  curLv = lv; curWIdx = 0;
  ['lv1btn','lv2btn','lv3btn'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', lv === 'level' + (i+1));
  });
  renderVocab();
}

// ── Trap-box HTML helper ──
function trapBlockHTML(d) {
  if (!d.trap && !d.paraphrase && !d.questionStem) return '';
  let s = '<div class="trap-box"><div class="trap-title">⚡ 题眼信息 — 雅思考点<\/div>';
  if (d.trap) s += '<div class="trap-row"><span class="trap-lbl">陷阱替换<\/span><span class="trap-val">' + (d.trap||'') + '<\/span><\/div>';
  if (d.paraphrase) s += '<div class="trap-row"><span class="trap-lbl">Paraphrase<\/span><span class="trap-val">' + (d.paraphrase||'') + '<\/span><\/div>';
  if (d.questionStem) s += '<div class="trap-row"><span class="trap-lbl">题型提示<\/span><span class="trap-val">' + (d.questionStem||'') + '<\/span><\/div>';
  return s + '<\/div>';
}

// ── ① Vocab ──
function renderVocab() {
  const list = reinforcing ? reinforceQueue : (vocabulary[curLv] || []);
  if (!list.length) {
    document.getElementById('vocab-card').innerHTML = '<div class="text-center p-10 text-slate-400">该等级暂无词汇<\/div>';
    return;
  }
  const idx = reinforcing ? 0 : curWIdx;
  const data = list[idx];
  if (!data) return;
  document.getElementById('reinforce-notice').style.display = reinforcing ? 'block' : 'none';
  document.getElementById('vocabProg').style.width = Math.round((idx / list.length) * 100) + '%';
  speak(data.word);
  if (vocabMode === 'ctx') renderVocabCtx(data, list.length, idx);
  else renderVocabDir(data, list.length, idx);
}

      </div>
      <div class="root-box">
        <div class="flex items-center mb-1"><span class="lbl lbl-r">词根词缀</span><span class="font-bold text-orange-800">${data.root||'—'}</span></div>
        <div class="text-xs text-orange-600/80 italic pl-[73px]">同根: ${data.rootExt||'—'}</div>
      </div>
      ${trapBlockHTML(data)}
    </div>
    <div class="grid grid-cols-3 gap-3 mt-auto pt-4" id="mark-btns" style="${hasBlanked ? 'display:none' : ''}">
      <button class="btn-mark bg-emerald-500" onclick="handleMark('known','v')">掌握 ✓</button>
      <button class="btn-mark bg-amber-500" onclick="handleMark('unsure','v')">模糊 ~</button>
      <button class="btn-mark bg-rose-500" onclick="handleMark('unknown','v')">不识 ✗</button>
    </div>
  `;

  // If the word wasn't found in sentence, auto-show reveal
  if (!hasBlanked) {
    document.getElementById('word-reveal').style.display = 'block';
  }
}

function revealWord() {
  const hw = document.getElementById('ctx-hw');
  const list = reinforcing ? reinforceQueue : (vocabulary[curLv] || []);
  const data = list[reinforcing ? 0 : curWIdx];
  if (hw && data) { hw.classList.add('revealed'); hw.textContent = data.word; }
  document.getElementById('word-reveal').style.display = 'block';
  const mb = document.getElementById('mark-btns');
  if (mb) mb.style.display = 'grid';
}

function renderVocabDir(data, total, idx) {
  document.getElementById('vocab-card').innerHTML = `
    <div class="flex justify-between items-start">
      <div class="flex-1">
        <div class="text-[0.58rem] font-bold text-blue-500 uppercase tracking-widest mb-1">${curLv}</div>
        <h1 class="text-3xl font-bold text-slate-800">${data.word}</h1>
        <div class="text-slate-400 text-sm mt-1">${data.phonetic || ''} <span onclick="speak('${data.word.replace(/'/g,"\\'")}'')" class="cursor-pointer ml-2">🔊</span></div>
      </div>
      <div class="text-right">
        <div class="text-slate-300 text-[0.6rem] font-bold mb-2">${idx+1} / ${total}</div>
        <div class="text-blue-600 font-bold text-xl">${data.meaning}</div>
      </div>
    </div>
    <div class="ex-box">
      <p class="text-sm font-bold text-blue-900 mb-1 leading-snug">"${data.example||''}"</p>
      <p class="text-[0.75rem] text-blue-700/70">${data.translation||''}</p>
    </div>
    <div class="detail-box space-y-2">
      <div class="flex"><span class="lbl">同义替换</span><span class="text-slate-600 font-bold">${data.syn||'—'}</span></div>
      <div class="flex"><span class="lbl">派生词</span><span class="text-slate-600">${data.derive||'—'}</span></div>
    </div>
    <div class="root-box">
      <div class="flex items-center mb-1"><span class="lbl lbl-r">词根词缀</span><span class="font-bold text-orange-800">${data.root||'—'}</span></div>
      <div class="text-xs text-orange-600/80 italic pl-[73px]">同根: ${data.rootExt||'—'}</div>
    </div>
    ${trapBlockHTML(data)}
    <div class="grid grid-cols-3 gap-3 mt-auto pt-4">
      <button class="btn-mark bg-emerald-500" onclick="handleMark('known','v')">掌握 ✓</button>
      <button class="btn-mark bg-amber-500" onclick="handleMark('unsure','v')">模糊 ~</button>
      <button class="btn-mark bg-rose-500" onclick="handleMark('unknown','v')">不识 ✗</button>
    </div>
  `;
}

function handleMark(status, type) {
  const cardId = type === 'v' ? 'vocab-card' : 'phrase-card';
  const card = document.getElementById(cardId);
  const cls = status === 'known' ? 'flash-green' : (status === 'unsure' ? 'flash-amber' : 'flash-rose');
  card.classList.add(cls);

  // Add to mistake/reinforce tracking
  if (status === 'unknown' || status === 'unsure') {
    const item = type === 'v'
      ? (reinforcing ? reinforceQueue[0] : (vocabulary[curLv]||[])[curWIdx])
      : phrasesData[curPIdx];
    if (item) {
      const key = item.word;
      if (!mistakeMap.has(key)) mistakeMap.set(key, { data: item, count: 1 });
      else mistakeMap.get(key).count++;
      if (!reinforceQueue.find(x => x.word === key)) reinforceQueue.push(item);
    }
  }

  setTimeout(() => {
    card.classList.remove(cls);
    if (type === 'v') advanceVocab();
    else advancePhrase();
  }, 800);
}

function advanceVocab() {
  if (reinforcing) {
    reinforceQueue.shift();
    if (reinforceQueue.length === 0) {
      reinforcing = false;
      document.getElementById('reinforce-notice').style.display = 'none';
      document.getElementById('vocab-card').innerHTML = '<div class="text-center p-10"><div class="text-5xl mb-4">🎯<\/div><div class="text-xl font-bold text-emerald-600">强化轮完成！<\/div><div class="text-sm text-slate-400 mt-2">切换「题眼训练」或「做题模拟」检验效果<\/div><\/div>';
    } else { renderVocab(); }
    return;
  }
  const list = vocabulary[curLv] || [];
  if (curWIdx < list.length - 1) { curWIdx++; renderVocab(); }
  else if (reinforceQueue.length > 0) {
    reinforcing = true;
    renderVocab();
  } else {
    const nextLv = { level1: 'level2', level2: 'level3' }[curLv];
    document.getElementById('vocab-card').innerHTML = `
      <div class="text-center p-10">
        <div class="text-5xl mb-4">✅</div>
        <div class="text-xl font-bold text-emerald-600">本级完成！无生词 🎉</div>
        ${nextLv ? `<button class="mt-6 px-6 py-3 bg-blue-500 text-white rounded-2xl font-bold" onclick="jumpLevel('${nextLv}')">继续下一级 →</button>` : ''}
      </div>
    `;
  }
}

// ── ④ Phrase ──
function renderPhrase() {
  if (!phrasesData.length) {
    document.getElementById('phrase-card').innerHTML = '<div class="text-center p-10 text-slate-400">暂无短语数据<\/div>';
    return;
  }
  const data = phrasesData[curPIdx];
  const total = phrasesData.length;
  document.getElementById('phraseProg').style.width = Math.round((curPIdx / total) * 100) + '%';
  document.getElementById('phrase-card').innerHTML = `
    <div class="flex justify-between items-start">
      <div class="flex-1">
        <div class="text-[0.6rem] font-bold text-emerald-500 uppercase tracking-widest mb-1">真题短语</div>
        <h1 class="text-2xl font-bold text-slate-800">${data.word}</h1>
      </div>
      <div class="text-right">
        <div class="text-slate-300 text-[0.6rem] font-bold mb-2">${curPIdx+1} / ${total}</div>
        <div class="text-emerald-600 font-bold text-lg">${data.meaning}</div>
      </div>
    </div>
    <div class="ex-box" style="border-left-color:#10b981;background:#ecfdf5;">
      <p class="text-sm font-bold text-emerald-900 mb-1 leading-snug">"${data.example||''}"</p>
      <p class="text-[0.75rem] text-emerald-700/70">${data.translation||''}</p>
    </div>
    <div class="detail-box">
      <div class="flex"><span class="lbl" style="color:#10b981">同义替换</span><span class="text-slate-600 font-bold">${data.syn||'—'}</span></div>
    </div>
    ${data.trap ? `<div class="trap-box"><div class="trap-title">⚡ 短语陷阱词<\/div><div class="trap-row"><span class="trap-lbl">陷阱替换<\/span><span class="trap-val">${data.trap}<\/span><\/div><\/div>` : ''}
    <div class="grid grid-cols-3 gap-3 mt-auto pt-4">
      <button class="btn-mark bg-emerald-500" onclick="handleMark('known','p')">掌握 ✓</button>
      <button class="btn-mark bg-amber-500" onclick="handleMark('unsure','p')">模糊 ~</button>
      <button class="btn-mark bg-rose-500" onclick="handleMark('unknown','p')">不识 ✗</button>
    </div>
  `;
}

function advancePhrase() {
  if (curPIdx < phrasesData.length - 1) { curPIdx++; renderPhrase(); }
  else {
    document.getElementById('phrase-card').innerHTML = '<div class="text-center p-10"><div class="text-5xl mb-4">🏁<\/div><div class="text-xl font-bold text-emerald-600">短语已全部复习！<\/div><button class="mt-6 px-6 py-3 bg-emerald-500 text-white rounded-2xl font-bold" onclick="curPIdx=0;renderPhrase()">再练一遍<\/button><\/div>';
  }
}

// ── ② Trap Quiz ──
function initTrap() {
  const all = [...(vocabulary.level1||[]), ...(vocabulary.level2||[]), ...(vocabulary.level3||[])];
  const withTrap = all.filter(w => w.trap || w.paraphrase || w.syn);
  if (!withTrap.length) {
    document.getElementById('trap-card').innerHTML = '<div class="text-center p-10 text-slate-400"><div class="text-4xl mb-4">⚠️<\/div><div class="font-bold mb-2">暂无题眼数据<\/div><div class="text-sm">请用 v16 Prompt 重新生成 JSON，即可解锁此模块</div><\/div>';
    return;
  }
  trapSet = [...withTrap].sort(() => Math.random() - 0.5).slice(0, Math.min(20, withTrap.length));
  curTrapIdx = 0;
  renderTrap();
}

function renderTrap() {
  const q = trapSet[curTrapIdx];
  const total = trapSet.length;
  document.getElementById('trapProg').style.width = Math.round((curTrapIdx / total) * 100) + '%';
  const all = [...(vocabulary.level1||[]), ...(vocabulary.level2||[]), ...(vocabulary.level3||[])];

  // Alternate between paraphrase-display mode and MCQ mode
  if (q.paraphrase && Math.random() > 0.4) {
    document.getElementById('trap-card').innerHTML = `
      <div class="text-[0.6rem] font-bold text-purple-600 uppercase tracking-widest mb-3">题眼训练 ${curTrapIdx+1}/${total} · Paraphrase 配对</div>
      <div class="trap-box mb-3">
        <div class="trap-title">Paraphrase 配对</div>
        <div class="text-base font-bold text-purple-900 leading-relaxed">${q.paraphrase}</div>
      </div>
      <div class="detail-box mb-3">
        原词 <strong class="text-blue-600">${q.word}</strong> 在题目中被替换为 <strong class="text-purple-600">${q.trap || q.syn || '?'}</strong>
      </div>
      <div class="text-xs text-slate-400 mb-4">记住：题目出现 <strong>${q.trap || q.syn || ''}</strong> → 对应原文的 <strong>${q.word}</strong></div>
      <div class="mt-auto">
        <button class="w-full py-4 bg-purple-600 text-white rounded-2xl font-bold text-base" onclick="advanceTrap()">已理解，下一题 →</button>
      </div>
    `;
    return;
  }

  // MCQ: given original word, pick the paraphrase
  const correct = q.trap || q.syn || q.word;
  const decoys = all.filter(x => x.word !== q.word).sort(() => Math.random() - 0.5).slice(0, 3)
    .map(x => x.trap || x.syn || x.word).filter(Boolean);
  const opts = [correct, ...decoys].sort(() => Math.random() - 0.5);

  document.getElementById('trap-card').innerHTML = `
    <div class="text-[0.6rem] font-bold text-purple-600 uppercase tracking-widest mb-4">题眼训练 ${curTrapIdx+1}/${total} · 同义替换识别</div>
    <div class="text-sm text-slate-500 mb-1">原文出现了：</div>
    <div class="text-4xl font-bold text-slate-800 mb-2 cursor-pointer" onclick="speak('${q.word.replace(/'/g,"\\'")}'')">${q.word} 🔊</div>
    <div class="text-slate-400 text-sm mb-4">${q.meaning || ''}</div>
    <div class="text-sm font-bold text-slate-600 mb-3">题目中最可能用哪个词替换它？</div>
    <div class="space-y-2">${opts.map(o => `<button class="opt-btn" onclick="checkTrap(this,'${escQ(o)}','${escQ(correct)}')">${o}</button>`).join('')}</div>
    ${q.example ? `<div class="text-xs text-slate-300 mt-3 pt-3 border-t border-slate-100">例句: ${q.example}<\/div>` : ''}
  `;
}

function checkTrap(el, sel, cor) {
  document.querySelectorAll('#trap-card .opt-btn').forEach(b => b.disabled = true);
  if (sel === cor) {
    el.style.borderColor = '#10b981'; el.style.background = '#ecfdf5';
    setTimeout(advanceTrap, 600);
  } else {
    el.style.borderColor = '#ef4444'; el.style.background = '#fef2f2';
    document.querySelectorAll('#trap-card .opt-btn').forEach(b => { if (b.textContent.trim() === cor) { b.style.borderColor = '#10b981'; b.style.background = '#ecfdf5'; } });
    setTimeout(advanceTrap, 1400);
  }
}

function advanceTrap() {
  if (curTrapIdx < trapSet.length - 1) { curTrapIdx++; renderTrap(); }
  else {
    document.getElementById('trapProg').style.width = '100%';
    document.getElementById('trap-card').innerHTML = '<div class="text-center p-10"><div class="text-5xl mb-4">🏆<\/div><div class="text-xl font-bold text-purple-600">题眼训练完成！<\/div><div class="text-sm text-slate-400 mt-2">去「做题模拟」实战检验吧</div><button class="mt-6 px-6 py-3 bg-purple-500 text-white rounded-2xl font-bold" onclick="initTrap()">再练一遍<\/button><\/div>';
  }
}

// ── ③ Sim Quiz ──
function initSim() {
  const all = [...(vocabulary.level1||[]), ...(vocabulary.level2||[]), ...(vocabulary.level3||[]), ...phrasesData];
  if (!all.length) return;
  simSet = [...all].sort(() => Math.random() - 0.5).slice(0, Math.min(20, all.length));
  curSimIdx = 0;
  renderSim();
}

function renderSim() {
  const total = simSet.length;
  document.getElementById('simProg').style.width = Math.round((curSimIdx / total) * 100) + '%';
  const q = simSet[curSimIdx];
  const all = [...(vocabulary.level1||[]), ...(vocabulary.level2||[]), ...(vocabulary.level3||[]), ...phrasesData];

  // Try fill-in-blank mode
  if (q.example) {
    const _qi = q.example.toLowerCase().indexOf(q.word.toLowerCase());
    const blanked = _qi >= 0 && !/[a-zA-Z]/.test(q.example[_qi-1]||'') && !/[a-zA-Z]/.test(q.example[_qi+q.word.length]||'') ? q.example.slice(0,_qi)+'______'+q.example.slice(_qi+q.word.length) : q.example;
    if (blanked !== q.example) {
      const decoys = all.filter(x => x.word !== q.word).sort(() => Math.random() - 0.5).slice(0, 3).map(x => x.word);
      const opts = [q.word, ...decoys].sort(() => Math.random() - 0.5);
      document.getElementById('sim-card').innerHTML = `
        <div class="text-[0.6rem] font-bold text-cyan-600 uppercase tracking-widest mb-3">做题模拟 ${curSimIdx+1}/${total} · 真题填空</div>
        <div class="text-xs text-slate-400 mb-2 font-bold">选出填入空格的正确词：</div>
        <div class="ex-box" style="border-left-color:#0ea5e9;background:#f0f9ff;">
          <p class="text-base font-bold text-slate-700 leading-relaxed">${blanked}</p>
        </div>
        <div class="text-xs text-slate-400 mb-3">译: ${q.translation||''}</div>
        ${q.trap ? `<div class="text-xs text-purple-500 mb-3">⚡ 注意：可能被替换为 <strong>${q.trap}<\/strong><\/div>` : ''}
        <div class="space-y-2">${opts.map(o => `<button class="opt-btn" onclick="checkSim(this,'${escQ(o)}','${escQ(q.word)}')">${o}</button>`).join('')}</div>
      `;
      return;
    }
  }

  // Fallback: meaning → word MCQ
  const decoys = all.filter(x => x.word !== q.word).sort(() => Math.random() - 0.5).slice(0, 3).map(x => x.word);
  const opts = [q.word, ...decoys].sort(() => Math.random() - 0.5);
  document.getElementById('sim-card').innerHTML = `
    <div class="text-[0.6rem] font-bold text-cyan-600 uppercase tracking-widest mb-3">做题模拟 ${curSimIdx+1}/${total} · 词义配对</div>
    <div class="text-xl font-bold text-slate-800 p-4 bg-sky-50 rounded-2xl mb-3">${q.meaning||''}</div>
    ${q.trap ? `<div class="text-xs text-purple-500 mb-3">⚡ 注意：可能被替换为 <strong>${q.trap}<\/strong><\/div>` : ''}
    <div class="space-y-2">${opts.map(o => `<button class="opt-btn" onclick="checkSim(this,'${escQ(o)}','${escQ(q.word)}')">${o}</button>`).join('')}</div>
  `;
}

function checkSim(el, sel, cor) {
  document.querySelectorAll('#sim-card .opt-btn').forEach(b => b.disabled = true);
  const advance = () => {
    if (curSimIdx < simSet.length - 1) { curSimIdx++; renderSim(); }
    else {
      document.getElementById('simProg').style.width = '100%';
      document.getElementById('sim-card').innerHTML = '<div class="text-center p-10"><div class="text-5xl mb-4">🎯<\/div><div class="text-xl font-bold text-cyan-600">模拟完成！<\/div><button class="mt-6 px-6 py-3 bg-cyan-500 text-white rounded-2xl font-bold" onclick="initSim()">再来一轮<\/button><\/div>';
    }
  };
  if (sel === cor) {
    el.style.borderColor = '#10b981'; el.style.background = '#ecfdf5';
    setTimeout(advance, 500);
  } else {
    el.style.borderColor = '#ef4444'; el.style.background = '#fef2f2';
    document.querySelectorAll('#sim-card .opt-btn').forEach(b => { if (b.textContent.trim() === cor) { b.style.borderColor = '#10b981'; b.style.background = '#ecfdf5'; } });
    setTimeout(advance, 1400);
  }
}

// ── ⑤ Mistakes ──
function renderMistakes() {
  const list = document.getElementById('mk-list');
  if (!mistakeMap.size) {
    list.innerHTML = '<div id="mk-empty">🎉 暂无生词<br><small>学习时标记「不识」或「模糊」的词会出现在这里</small><\/div>';
    return;
  }
  list.innerHTML = [...mistakeMap.values()].map(({ data: w, count }) => `
    <div class="mk-item">
      <div class="flex justify-between items-start">
        <div>
          <div class="mk-word">${w.word}</div>
          <div class="mk-meaning">${w.meaning}</div>
        </div>
        <div class="text-[0.65rem] bg-red-50 border border-red-200 text-red-500 rounded-full px-2 py-0.5 font-bold">错${count}次</div>
      </div>
      ${w.trap ? `<div class="text-xs text-purple-500 mt-2">⚡ 陷阱替换: ${w.trap}<\/div>` : ''}
      ${w.example ? `<div class="text-xs text-slate-400 mt-1 italic">${w.example}<\/div>` : ''}
    </div>
  `).join('');
}

renderVocab();
renderPhrase();
</script>
</body>
</html>
