<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雅思词汇页面生成器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-primary: #1565c0;
    --blue-mid: #1e88e5;
    --blue-light: #42a5f5;
    --blue-pale: #e3f2fd;
    --blue-palest: #f0f7ff;
    --surface: #ffffff;
    --border: #dbeafe;
    --text-primary: #1a237e;
    --text-secondary: #455a64;
    --text-muted: #90a4ae;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 6px rgba(21,101,192,0.08);
    --shadow-md: 0 4px 20px rgba(21,101,192,0.12);
    --shadow-lg: 0 8px 32px rgba(21,101,192,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', 'Noto Sans SC', sans-serif;
    background: linear-gradient(160deg, #f0f4f8 0%, #e8f4fd 50%, #e3f2fd 100%);
    min-height: 100vh;
    color: var(--text-primary);
  }

  /* ── TOP BAR ── */
  .topbar {
    background: linear-gradient(120deg, #1565c0 0%, #1e88e5 65%, #42a5f5 100%);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar-icon {
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.18);
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .topbar-title { color: #fff; }
  .topbar-title h1 { font-size: 20px; font-weight: 700; line-height: 1.2; }
  .topbar-title p { font-size: 13px; color: rgba(255,255,255,0.75); margin-top: 2px; }
  .topbar-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* ── LAYOUT ── */
  .app-layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    min-height: calc(100vh - 84px);
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
    max-height: calc(100vh - 84px);
    position: sticky;
    top: 0;
  }

  .panel-section {
    background: var(--blue-palest);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px;
  }
  .panel-section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--blue-primary);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .panel-section-title::before {
    content: '';
    width: 3px; height: 14px;
    background: var(--blue-light);
    border-radius: 2px;
    display: inline-block;
  }

  .form-group { margin-bottom: 12px; }
  .form-group:last-child { margin-bottom: 0; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 5px;
  }
  .form-input, .form-select {
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text-primary);
    background: #fff;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus {
    border-color: var(--blue-light);
    box-shadow: 0 0 0 3px rgba(66,165,245,0.15);
  }

  /* ── PASTE AREA ── */
  .paste-area {
    width: 100%;
    min-height: 220px;
    padding: 12px;
    border: 2px dashed var(--border);
    border-radius: var(--radius-sm);
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-secondary);
    background: #fff;
    outline: none;
    font-family: 'Noto Sans SC', monospace;
    resize: vertical;
    transition: border-color 0.2s;
  }
  .paste-area:focus { border-color: var(--blue-light); }
  .paste-area::placeholder { color: var(--text-muted); font-style: italic; }

  .format-hint {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 11.5px;
    color: var(--text-secondary);
    line-height: 1.7;
  }
  .format-hint strong { color: var(--blue-primary); }
  .format-hint code {
    background: var(--blue-pale);
    color: var(--blue-primary);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 11px;
    font-family: monospace;
  }

  /* ── BUTTONS ── */
  .btn-row { display: flex; gap: 8px; }
  .btn-primary {
    flex: 1;
    padding: 11px 16px;
    background: linear-gradient(120deg, #1565c0, #1e88e5);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s, transform 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary {
    padding: 11px 14px;
    background: #fff;
    color: var(--blue-primary);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .btn-secondary:hover { background: var(--blue-pale); border-color: var(--blue-light); }

  .btn-download {
    width: 100%;
    padding: 11px;
    background: #fff;
    color: var(--blue-primary);
    border: 2px solid var(--blue-primary);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-download:hover { background: var(--blue-primary); color: #fff; }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .stat-chip {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    text-align: center;
  }
  .stat-chip-num {
    font-size: 20px;
    font-weight: 700;
    color: var(--blue-primary);
    display: block;
  }
  .stat-chip-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── CATEGORY PILLS ── */
  .category-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
  }
  .cat-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
  }
  .cat-name { color: var(--text-primary); font-weight: 600; }
  .cat-count {
    background: var(--blue-pale);
    color: var(--blue-primary);
    font-size: 11px;
    font-weight: 700;
    padding: 1px 8px;
    border-radius: 10px;
  }

  /* ── STATUS ── */
  .status-bar {
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .status-bar.idle { background: var(--blue-pale); color: var(--blue-primary); }
  .status-bar.success { background: #e8f5e9; color: #2e7d32; }
  .status-bar.error { background: #ffebee; color: #c62828; }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  /* ── RIGHT PANEL: PREVIEW ── */
  .right-panel {
    overflow-y: auto;
    max-height: calc(100vh - 84px);
    background: linear-gradient(135deg, #f0f4f8, #e3f2fd);
  }

  .preview-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 400px;
    color: var(--text-muted);
    text-align: center;
    padding: 40px;
  }
  .preview-empty-icon {
    width: 80px; height: 80px;
    background: rgba(21,101,192,0.06);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 20px;
  }
  .preview-empty h3 { font-size: 18px; font-weight: 600; color: var(--blue-primary); margin-bottom: 8px; }
  .preview-empty p { font-size: 13px; line-height: 1.7; max-width: 300px; }

  /* ── PREVIEW OUTPUT (matches Day 1/2 style) ── */
  #preview-output { display: none; }

  .out-header {
    background: linear-gradient(120deg, #1565c0 0%, #1e88e5 60%, #42a5f5 100%);
    padding: 40px 24px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .out-header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 30%, rgba(255,255,255,0.12) 0%, transparent 60%);
  }
  .out-badge {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.35);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 14px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .out-title { font-size: clamp(18px,4vw,30px); font-weight: 700; color: #fff; margin-bottom: 6px; }
  .out-subtitle { color: rgba(255,255,255,0.85); font-size: 14px; }
  .out-stats { display: flex; justify-content: center; gap: 20px; margin-top: 24px; flex-wrap: wrap; }
  .out-stat { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); border-radius: 10px; padding: 10px 20px; text-align: center; min-width: 85px; }
  .out-stat-num { font-size: 24px; font-weight: 700; color: #fff; display: block; line-height: 1; }
  .out-stat-label { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 3px; display: block; }

  .out-progress { display: flex; justify-content: center; gap: 6px; padding: 16px; flex-wrap: wrap; }
  .out-day-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; background: #fff; border: 2px solid #dbeafe; color: #90a4ae; }
  .out-day-dot.active { background: #1565c0; border-color: #1565c0; color: #fff; box-shadow: 0 3px 10px rgba(21,101,192,0.3); }
  .out-day-dot.done { background: #e3f2fd; border-color: #42a5f5; color: #1565c0; }

  .out-body { padding: 24px 16px; max-width: 1100px; margin: 0 auto; }

  .out-card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 2px 12px rgba(21,101,192,0.08);
    margin-bottom: 16px;
    overflow: hidden;
    border: 1px solid rgba(21,101,192,0.07);
    transition: box-shadow 0.25s;
  }
  .out-card:hover { box-shadow: 0 8px 28px rgba(21,101,192,0.14); }

  .out-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 20px;
    cursor: pointer;
    background: linear-gradient(90deg, #f8fbff 0%, #fff 100%);
    border-bottom: 2px solid #e3f2fd;
    user-select: none;
    transition: background 0.2s;
  }
  .out-card-header:hover { background: linear-gradient(90deg, #e8f4fd 0%, #f0f8ff 100%); }

  .out-card-title-wrap { display: flex; align-items: center; gap: 8px; }
  .out-card-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #1e88e5, #42a5f5);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 13px; flex-shrink: 0;
  }
  .out-card-title { font-size: 15px; font-weight: 700; color: #1565c0; }
  .out-card-count { background: #e3f2fd; color: #1565c0; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 10px; }
  .out-card-toggle {
    width: 28px; height: 28px; border-radius: 50%;
    background: #e3f2fd; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #1565c0; font-size: 16px;
    transition: transform 0.3s, background 0.2s;
    flex-shrink: 0;
  }
  .out-card-toggle.open { transform: rotate(180deg); background: #1565c0; color: #fff; }

  .out-card-body { padding: 16px 16px 20px; display: none; }
  .out-card-body.open { display: block; }

  .out-sublabel {
    font-size: 12px; font-weight: 700; color: #42a5f5;
    letter-spacing: 0.5px; margin: 14px 0 8px;
    padding-left: 8px; border-left: 3px solid #42a5f5;
    border-radius: 0;
  }
  .out-sublabel:first-child { margin-top: 0; }

  .out-word-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }
  .out-word-item {
    background: linear-gradient(135deg, #f8fbff, #fff);
    border: 1px solid #dbeafe;
    border-radius: 8px;
    padding: 8px 10px;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    cursor: default;
  }
  .out-word-item:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(21,101,192,0.13); border-color: #42a5f5; }
  .out-word-en { font-size: 13px; font-weight: 700; color: #1565c0; line-height: 1.3; margin-bottom: 1px; }
  .out-word-ph { font-size: 11px; color: #90a4ae; font-style: italic; line-height: 1.3; margin-bottom: 2px; }
  .out-word-zh { font-size: 11px; color: #455a64; line-height: 1.3; }

  .out-footer {
    background: linear-gradient(120deg, #1565c0, #1e88e5);
    color: #fff;
    text-align: center;
    padding: 28px 24px;
    margin-top: 24px;
  }
  .out-footer-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
  .out-tips { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
  .out-tip { background: rgba(255,255,255,0.13); border: 1px solid rgba(255,255,255,0.22); border-radius: 8px; padding: 6px 14px; font-size: 12px; color: rgba(255,255,255,0.9); }
  .out-footer-note { margin-top: 16px; font-size: 11px; color: rgba(255,255,255,0.55); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c5d8f0; border-radius: 3px; }

  @media (max-width: 860px) {
    .app-layout { grid-template-columns: 1fr; }
    .left-panel { max-height: none; position: static; }
    .right-panel { max-height: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-icon">📖</div>
  <div class="topbar-title">
    <h1>雅思词汇页面生成器</h1>
    <p>粘贴词汇 → 即时生成 Day HTML 文件（含音标）</p>
  </div>
  <div class="topbar-badge">IELTS Tool</div>
</div>

<div class="app-layout">

  <!-- ══ LEFT PANEL ══ -->
  <div class="left-panel">

    <!-- 基本设置 -->
    <div class="panel-section">
      <div class="panel-section-title">基本设置</div>
      <div class="form-group">
        <label class="form-label">Day 编号</label>
        <select class="form-select" id="dayNum">
          <option value="3">Day 3</option>
          <option value="4">Day 4</option>
          <option value="5">Day 5</option>
          <option value="6">Day 6</option>
          <option value="7">Day 7</option>
          <option value="8">Day 8</option>
          <option value="9">Day 9</option>
          <option value="10">Day 10</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">主题名称（显示在副标题）</label>
        <input type="text" class="form-input" id="dayTheme" placeholder="例：家庭人物与日常社交类" />
      </div>
      <div class="form-group">
        <label class="form-label">副标题描述（可选）</label>
        <input type="text" class="form-input" id="daySubtitle" placeholder="例：家庭成员、人物描述、社交场景" />
      </div>
      <div class="form-group">
        <label class="form-label">学习建议（用分号分隔，最多6条）</label>
        <input type="text" class="form-input" id="dayTips" placeholder="多听对话录音;注意人物称谓拼写" />
      </div>
    </div>

    <!-- 词汇输入 -->
    <div class="panel-section">
      <div class="panel-section-title">词汇内容输入</div>

      <div class="format-hint" style="margin-bottom:10px;">
        <strong>格式说明</strong> — 每行一个词条，用竖线 <code>|</code> 分隔：<br>
        <code>英文 | 音标 | 中文</code><br>
        用 <code>###</code> 开头行作为分类标题：<br>
        <code>### 一、家庭成员</code><br>
        用 <code>##</code> 开头行作为子分类：<br>
        <code>## 核心成员</code>
      </div>

      <textarea class="paste-area" id="vocabInput" placeholder="### 一、家庭成员 (30词)
## 核心成员
mother | /ˈmʌðər/ | 母亲
father | /ˈfɑːðər/ | 父亲
sibling | /ˈsɪblɪŋ/ | 兄弟姐妹
## 扩展亲属
grandparent | /ˈɡrændpeərənt/ | 祖父母
### 二、人物描述 (20词)
## 性格词汇
friendly | /ˈfrendli/ | 友好的"></textarea>

      <div class="stats-row" style="margin-top:10px;">
        <div class="stat-chip"><span class="stat-chip-num" id="statWords">0</span><span class="stat-chip-label">词条</span></div>
        <div class="stat-chip"><span class="stat-chip-num" id="statCats">0</span><span class="stat-chip-label">大类</span></div>
        <div class="stat-chip"><span class="stat-chip-num" id="statSubs">0</span><span class="stat-chip-label">小节</span></div>
      </div>
    </div>

    <!-- 分类预览 -->
    <div class="panel-section" id="catPreviewSection" style="display:none;">
      <div class="panel-section-title">识别到的分类</div>
      <div class="category-list" id="catList"></div>
    </div>

    <!-- 状态 -->
    <div class="status-bar idle" id="statusBar">
      <div class="status-dot"></div>
      <span id="statusText">等待输入词汇...</span>
    </div>

    <!-- 操作按钮 -->
    <div class="btn-row">
      <button class="btn-primary" onclick="generatePreview()">
        ▶ 生成预览
      </button>
      <button class="btn-secondary" onclick="clearAll()">清空</button>
    </div>
    <button class="btn-download" id="downloadBtn" onclick="downloadHTML()" style="display:none;">
      ⬇ 下载 HTML 文件
    </button>

  </div>

  <!-- ══ RIGHT PANEL ══ -->
  <div class="right-panel" id="rightPanel">

    <div class="preview-empty" id="previewEmpty">
      <div class="preview-empty-icon">📄</div>
      <h3>预览区域</h3>
      <p>在左侧填写设置并粘贴词汇，点击「生成预览」即可在此看到与 Day 1/2 完全一致的页面样式（含音标）。</p>
    </div>

    <div id="preview-output">
      <!-- 动态生成 -->
    </div>

  </div>
</div>

<script>
const vocabInput = document.getElementById('vocabInput');
const dayNum = document.getElementById('dayNum');
const dayTheme = document.getElementById('dayTheme');
const daySubtitle = document.getElementById('daySubtitle');
const dayTips = document.getElementById('dayTips');
const statWords = document.getElementById('statWords');
const statCats = document.getElementById('statCats');
const statSubs = document.getElementById('statSubs');
const statusBar = document.getElementById('statusBar');
const statusText = document.getElementById('statusText');
const catList = document.getElementById('catList');
const catPreviewSection = document.getElementById('catPreviewSection');
const previewEmpty = document.getElementById('previewEmpty');
const previewOutput = document.getElementById('preview-output');
const downloadBtn = document.getElementById('downloadBtn');

let parsedData = null;
let generatedHTML = '';

function setStatus(msg, type) {
  statusBar.className = 'status-bar ' + type;
  statusText.textContent = msg;
}

function parseVocab(raw) {
  const lines = raw.split('\n');
  const categories = [];
  let currentCat = null;
  let currentSub = null;
  let totalWords = 0, totalCats = 0, totalSubs = 0;

  for (let line of lines) {
    line = line.trim();
    if (!line) continue;

    if (line.startsWith('###')) {
      const catName = line.replace(/^###\s*/, '').trim();
      currentCat = { name: catName, subs: [] };
      currentSub = null;
      categories.push(currentCat);
      totalCats++;
    } else if (line.startsWith('##')) {
      const subName = line.replace(/^##\s*/, '').trim();
      currentSub = { name: subName, words: [] };
      if (!currentCat) {
        currentCat = { name: '词汇列表', subs: [] };
        categories.push(currentCat);
        totalCats++;
      }
      currentCat.subs.push(currentSub);
      totalSubs++;
    } else if (line.includes('|')) {
      const parts = line.split('|').map(p => p.trim());
      if (parts.length >= 2) {
        const word = {
          en: parts[0] || '',
          ph: parts.length >= 3 ? parts[1] : '',
          zh: parts.length >= 3 ? parts[2] : parts[1]
        };
        if (!word.en) continue;
        totalWords++;

        if (!currentSub) {
          if (!currentCat) {
            currentCat = { name: '词汇列表', subs: [] };
            categories.push(currentCat);
            totalCats++;
          }
          currentSub = { name: '', words: [] };
          currentCat.subs.push(currentSub);
          totalSubs++;
        }
        currentSub.words.push(word);
      }
    }
  }

  return { categories, totalWords, totalCats, totalSubs };
}

vocabInput.addEventListener('input', () => {
  const raw = vocabInput.value.trim();
  if (!raw) {
    statWords.textContent = '0';
    statCats.textContent = '0';
    statSubs.textContent = '0';
    catPreviewSection.style.display = 'none';
    setStatus('等待输入词汇...', 'idle');
    return;
  }
  const data = parseVocab(raw);
  statWords.textContent = data.totalWords;
  statCats.textContent = data.totalCats;
  statSubs.textContent = data.totalSubs;

  if (data.categories.length > 0) {
    catList.innerHTML = '';
    data.categories.forEach(cat => {
      const wordCount = cat.subs.reduce((s, sub) => s + sub.words.length, 0);
      const item = document.createElement('div');
      item.className = 'cat-item';
      item.innerHTML = `<span class="cat-name">${cat.name.replace(/\(\d+词\)/g,'').trim()}</span><span class="cat-count">${wordCount}词</span>`;
      catList.appendChild(item);
    });
    catPreviewSection.style.display = 'block';
    setStatus(`已识别 ${data.totalCats} 个大类，${data.totalWords} 个词条`, 'success');
  }
  parsedData = data;
});

function makeWordItem(w) {
  return `<div class="out-word-item">
  <div class="out-word-en">${esc(w.en)}</div>
  ${w.ph ? `<div class="out-word-ph">${esc(w.ph)}</div>` : ''}
  <div class="out-word-zh">${esc(w.zh)}</div>
</div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const ICONS = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮'];

function generatePreview() {
  const raw = vocabInput.value.trim();
  if (!raw) { setStatus('请先粘贴词汇内容！', 'error'); return; }

  const data = parseVocab(raw);
  if (data.totalWords === 0) { setStatus('未识别到有效词条，请检查格式（英文|音标|中文）', 'error'); return; }

  const dn = parseInt(dayNum.value);
  const theme = dayTheme.value.trim() || `Day ${dn} 词汇`;
  const subtitle = daySubtitle.value.trim() || '';
  const tipsRaw = dayTips.value.trim();
  const tips = tipsRaw ? tipsRaw.split(';').map(t=>t.trim()).filter(Boolean) : ['认真听录音', '反复复习词汇', '结合场景记忆', '做真题练习'];

  let cardsHTML = '';
  data.categories.forEach((cat, ci) => {
    const wordCount = cat.subs.reduce((s, sub) => s + sub.words.length, 0);
    const isOpen = ci < 2;
    let subsHTML = '';
    cat.subs.forEach(sub => {
      if (sub.words.length === 0) return;
      const subLabel = sub.name ? `<div class="out-sublabel">${esc(sub.name)}</div>` : '';
      const wordsHTML = sub.words.map(makeWordItem).join('\n');
      subsHTML += subLabel + `<div class="out-word-grid">${wordsHTML}</div>`;
    });

    cardsHTML += `
<div class="out-card">
  <div class="out-card-header" onclick="toggleCard(this)">
    <div class="out-card-title-wrap">
      <div class="out-card-icon">${ICONS[ci] || (ci+1)}</div>

      <span class="out-card-count">${wordCount}词</span>
    </div>
    <button class="out-card-toggle ${isOpen ? 'open' : ''}">▼</button>
  </div>
  <div class="out-card-body ${isOpen ? 'open' : ''}">
    ${subsHTML}
  </div>
</div>`;
  });

  let dotsHTML = '';
  for (let i = 1; i <= 10; i++) {
    const cls = i < dn ? 'done' : (i === dn ? 'active' : '');
    dotsHTML += `<div class="out-day-dot ${cls}">${i}</div>`;
  }

  const tipsHTML = tips.map(t => `<div class="out-tip">${esc(t)}</div>`).join('');

  const outputHTML = `
<div class="out-header">
  <div class="out-badge">IELTS Listening Vocabulary</div>
  <div class="out-title">10天5000雅思听力核心词汇</div>
  <div class="out-subtitle">Day ${dn} · ${esc(theme)}${subtitle ? ' — ' + esc(subtitle) : ''}</div>
  <div class="out-stats">
    <div class="out-stat"><span class="out-stat-num">10</span><span class="out-stat-label">总天数</span></div>
    <div class="out-stat"><span class="out-stat-num">${data.totalWords}</span><span class="out-stat-label">今日词汇</span></div>
    <div class="out-stat"><span class="out-stat-num">5000</span><span class="out-stat-label">总词汇量</span></div>
    <div class="out-stat"><span class="out-stat-num">Day ${dn}</span><span class="out-stat-label">当前进度</span></div>
  </div>
</div>
<div class="out-progress">${dotsHTML}</div>
<div class="out-body">${cardsHTML}</div>
<div class="out-footer">
  <div class="out-footer-title">📚 Day ${dn} 学习建议</div>
  <div class="out-tips">${tipsHTML}</div>
  <div class="out-footer-note">10天5000雅思听力核心词汇 · Day ${dn}/10 · ${esc(theme)} · 共${data.totalWords}词</div>
</div>`;

  previewEmpty.style.display = 'none';
  previewOutput.style.display = 'block';
  previewOutput.innerHTML = outputHTML;

  generatedHTML = buildStandaloneHTML(dn, theme, subtitle, tips, data);
  downloadBtn.style.display = 'flex';
  parsedData = data;
  setStatus(`✓ 预览生成成功，共 ${data.totalWords} 词 · ${data.totalCats} 大类`, 'success');
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  const btn = header.querySelector('.out-card-toggle');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
}

function downloadHTML() {
  if (!generatedHTML) return;
  const dn = dayNum.value;
  const blob = new Blob([generatedHTML], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ielts-day${dn}.html`;
  a.click();
  URL.revokeObjectURL(url);
  setStatus(`✓ ielts-day${dn}.html 已下载`, 'success');
}
